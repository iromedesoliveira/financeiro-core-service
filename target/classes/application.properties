# Configurações do servidor
server.port=8082

# Conexão com Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
spring.datasource.password=${NV_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# OTIMIZAÇÃO CRÍTICA: Impedir o Hibernate de tentar ler metadados do banco no início
spring.jpa.hibernate.ddl-auto=update

# Desabilita completamente a leitura de metadados JDBC que causa o ORA-17800
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Dialeto definido explicitamente
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Aumenta timeout para conexões do pool
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.initialization-fail-timeout=-1

# Configurações para forçar a validação da conexão e evitar o "undefined/unknown"
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10

# Outras configurações
server.error.whitelabel.enabled=false
spring.jackson.serialization.indent-output=true
spring.jpa.open-in-view=false