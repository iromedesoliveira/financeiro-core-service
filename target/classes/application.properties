# Conexão com o seu Oracle local
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
# COLOQUE SUA SENHA REAL AQUI, SEM O ${...}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configurações do Hibernate
# Usar create-drop para limpar o banco a cada reinício e evitar erros de duplicidade
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Limpeza de logs e avisos
spring.jpa.open-in-view=false

# Segurança (Desativada para testes)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Inicialização de dados
spring.sql.init.mode=always