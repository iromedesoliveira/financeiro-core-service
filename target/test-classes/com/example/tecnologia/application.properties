# Configurações do Servidor
server.port=8083

# Conexão H2 - Otimizada para Testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console do H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desativa DDL automático para o schema.sql assumir o controle
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# Estratégia de Naming: Mantém exatamente como no Java
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Dialeto otimizado para H2 em modo MySQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Logs para depuração
spring.jpa.show-sql=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Pool de conexões mínimo para testes
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5