# --- Configurações do Servidor ---
# Em testes, preferimos porta 0 para evitar conflitos se você rodar vários testes ao mesmo tempo
server.port=0

# --- Conexão H2 - Otimizada para Testes ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Console do H2 (Opcional em testes, mas útil se você precisar debugar) ---
spring.h2.console.enabled=true

# --- Estratégia de DDL ---
# Como você usa schema.sql, 'none' é a escolha correta. 
# Adicionei 'hibernate.ddl-auto=none' para garantir que o Hibernate não tente alterar nada.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# --- Configurações de Naming e Dialeto ---
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Logs e Performance ---
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Pool de Conexões ---
spring.datasource.hikari.maximum-pool-size=2